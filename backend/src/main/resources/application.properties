spring.profiles.active=dev
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# JWT Configuration
app.jwt.expiration=86400000
# JPA Configuration
# ddl-auto=update keeps your data between restarts (good for dev).
# Use "validate" in production once you manage schema via migrations.
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Cookie Configuration — set to true in production (requires HTTPS)
app.cookie.secure=false

# CORS Configuration
app.cors.allowed-origins=http://localhost:3000

# Logging
logging.level.com.moviebooking=DEBUG
logging.level.org.springframework.security=DEBUG
