# ?? Profile ????????????????????????????????????????????????????????????????????
spring.profiles.active=${SPRING_PROFILES_ACTIVE:dev}

# ?? Server ?????????????????????????????????????????????????????????????????????
server.port=${PORT:8081}

# ?? Database (overridden by dev/prod properties) ???????????????????????????????
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/moviedb}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:root}
spring.datasource.driver-class-name=${DB_DRIVER:com.mysql.cj.jdbc.Driver}
spring.jpa.database-platform=${DB_DIALECT:org.hibernate.dialect.MySQLDialect}

# ?? JPA ????????????????????????????????????????????????????????????????????????
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.open-in-view=false

# ?? JWT ????????????????????????????????????????????????????????????????????????
app.jwt.secret=${JWT_SECRET:YourSuperSecretKeyForJWTTokenGenerationThatIsAtLeast256BitsLong}
# JWT Configuration
app.jwt.expiration=86400000

# ?? Cookie ?????????????????????????????????????????????????????????????????????
app.cookie.secure=${COOKIE_SECURE:false}


# Email - Gmail SMTP via SSL port 465
spring.mail.host=smtp.gmail.com
spring.mail.port=465
spring.mail.username=${MAIL_USERNAME:your-email@gmail.com}
spring.mail.password=${MAIL_PASSWORD:your-app-password}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.ssl.enable=true
spring.mail.properties.mail.smtp.starttls.enable=false
spring.mail.properties.mail.smtp.starttls.required=false
spring.mail.properties.mail.smtp.connectiontimeout=10000
spring.mail.properties.mail.smtp.timeout=10000
spring.mail.properties.mail.smtp.writetimeout=10000
spring.mail.properties.mail.smtp.socketFactory.port=465
spring.mail.properties.mail.smtp.socketFactory.class=javax.net.ssl.SSLSocketFactory

# ?? CORS ???????????????????????????????????????????????????????????????????????
app.cors.allowed-origins=${CORS_ORIGINS:http://localhost:3000}

# ?? Logging ????????????????????????????????????????????????????????????????????
logging.level.com.moviebooking=${LOG_LEVEL:INFO}
logging.level.org.springframework.security=${LOG_LEVEL:WARN}
